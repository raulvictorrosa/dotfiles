set -g mouse on
set -ga terminal-overrides ",screen-256color*:Tc"
set -g default-terminal "tmux-256color"

# Force the terminal to use a blinking line cursor (code 5 for blinking bar) for all terminal types within tmux
set -as terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[2 q'

# Explicitly tell newer tmux versions that the terminal supports cursor style changes
set -as terminal-features ',*:cstyle'

# set -s escape-time 0
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

bind r source-file $XDG_CONFIG_HOME/tmux/tmux.conf \; display "Config reloaded!"

set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

set-window-option -g mode-keys vi
# bind -T copy-mode-vi v send-keys -X begin-selection
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# forget the find window.  That is for chumps
# bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
# set -g @dracula-plugins "batery git weather time"
# set -g @dracula-show-flags true
# # set -g @dracula-border-contrast true
# set -g @dracula-show-powerline true
# set -g @dracula-show-left-icon "#h | #S"
# set -g @dracula-battery-label "🗲 "
# set -g @dracula-git-disable-status false
# set -g @dracula-git-show-repo-name true
# set -g @dracula-show-timezone false
# set -g @dracula-military-time true
# set -g @dracula-show-fahrenheit false
# set -g @dracula-fixed-location "Lisbon"
# set -g @dracula-show-location false

set -g @tokyo-night-tmux_theme storm
set -g @tokyo-night-tmux_pane_id_style dsquare
set -g @tokyo-night-tmux_time_format 24H
set -g @tokyo-night-tmux_show_netspeed 0
set -g @tokyo-night-tmux_show_path 0
set -g @tokyo-night-tmux_show_battery_widget 1

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'dracula/tmux'
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @plugin 'alexwforsythe/tmux-which-key'
# set -g @plugin 'christoomey/vim-tmux-navigator'

if "test ! -d $XDG_CONFIG_HOME/tmux/plugins/tpm" \
"run 'git clone https://github.com/tmux-plugins/tpm $XDG_CONFIG_HOME/tmux/plugins/tpm && $XDG_CONFIG_HOME/tmux/plugins/tpm/bin/install_plugins'"

if "test -d $XDG_CONFIG_HOME/tmux/plugins/tpm/.git" \
"run 'rm -rf $XDG_CONFIG_HOME/tmux/plugins/tpm/.git/'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# run '$XDG_CONFIG_HOME/tmux/plugins/tpm/tpm'
run -b '$XDG_CONFIG_HOME/tmux/plugins/tpm/tpm'

